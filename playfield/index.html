<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipper — Playfield</title>
  <style>
    #connect-serial {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10001;
      padding: 6px 12px;
      background: #0f0;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: "Courier New", monospace;
      font-weight: bold;
      cursor: pointer;
    }

    #connect-serial[data-connected="true"] {
      background: #0a0;
      color: #fff;
      cursor: default;
    }
  </style>
</head>

<body>
  <button id="connect-serial" type="button" title="Necessaire seulement la 1re fois">Connecter ESP32</button>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
