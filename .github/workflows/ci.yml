name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: server
            command: "npm test"
          - dir: playfield
            command: "npm run build && npm test"
          - dir: backglass
            command: "npm run build && npm test"
          - dir: dmd
            command: "npm run build && npm test"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ${{ matrix.dir }}
        working-directory: ${{ matrix.dir }}
        run: ${{ matrix.command }}