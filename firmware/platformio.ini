; Projet PlatformIO — firmware boutons cabinet.
; Le workflow .github/workflows/firmware.yml lance `pio run` ici, merge le
; resultat avec esptool et commit firmware/build/firmware.bin. Le cabinet
; flashe ce binaire au Load (cf. [esp32.esp32] dans fliphetic.toml).

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
