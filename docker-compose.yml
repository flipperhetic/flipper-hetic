services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      # wget souvent absent sur node:alpine — HTTP via Node
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  playfield:
    build:
      context: .
      dockerfile: playfield/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_healthy

  backglass:
    build:
      context: .
      dockerfile: backglass/Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      server:
        condition: service_healthy

  dmd:
    build:
      context: .
      dockerfile: dmd/Dockerfile
    ports:
      - "5175:5175"
    depends_on:
      server:
        condition: service_healthy

  # Lit l'ESP32 boutons sur /dev/ttyUSB0 et relaie au server socket.io.
  # Le cabinet flashe le firmware AVANT le `compose up` (cf. fliphetic.toml),
  # donc /dev/ttyUSB0 est present a ce moment-la. Sur un poste sans ESP32
  # branche, ce service echouera a creer le conteneur — attendu (prod = cab).
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERIAL_PATH: /dev/ttyUSB0
      SERIAL_BAUD: "115200"
      SERVER_URL: http://server:3000
    depends_on:
      server:
        condition: service_healthy
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
