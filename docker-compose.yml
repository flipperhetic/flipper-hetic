services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      # wget souvent absent sur node:alpine — HTTP via Node
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  playfield:
    build:
      context: .
      dockerfile: playfield/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_healthy

  backglass:
    build:
      context: .
      dockerfile: backglass/Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      server:
        condition: service_healthy

  dmd:
    build:
      context: .
      dockerfile: dmd/Dockerfile
    ports:
      - "5175:5175"
    depends_on:
      server:
        condition: service_healthy

  # Lit l'ESP32 boutons sur /dev/ttyUSB0 et relaie au server WebSocket.
  # Le cabinet flashe le firmware AVANT le `compose up` (cf. fliphetic.toml).
  #
  # On NE declare PAS le device en dur via `devices:` : le daemon Docker valide
  # ce mapping au moment du `create`, donc si /dev/ttyUSB0 est absent (poste sans
  # ESP32, ou flash firmware pas encore termine au deploiement) tout le
  # `compose up` echoue. A la place on bind-monte /dev (le device apparait des
  # qu'il est enumere, meme apres le demarrage du conteneur) et on autorise les
  # char devices serie USB (major 188 = ttyUSB) via cgroup. server.js retry
  # l'ouverture du port toutes les 3s, donc le conteneur reste up dans tous les
  # cas et se rebranche automatiquement quand l'ESP32 est present.
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERIAL_PATH: /dev/ttyUSB0
      SERIAL_BAUD: "115200"
      SERVER_URL: ws://server:3000
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - "/dev:/dev"
    device_cgroup_rules:
      - "c 188:* rmw"
